<svg xmlns="http://www.w3.org/2000/svg" width="980" height="900" viewBox="0 0 980 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4D4D4D"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="980" height="900" fill="#FFFFFF"/>

  <!-- title -->
  <text x="490" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#232F3E">Enterprise AI Ops Copilot — System Architecture</text>
  <text x="490" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">FastAPI · LangGraph · RAG · Amazon Bedrock · Guardrails</text>

  <!-- ===== edges (drawn first so boxes sit on top) ===== -->
  <g stroke="#4D4D4D" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <!-- spine -->
    <path d="M 490 121 L 490 156"/>
    <path d="M 490 209 L 490 244"/>
    <path d="M 490 297 L 490 332"/>
    <!-- fan out to tools -->
    <path d="M 460 385 C 300 420, 180 425, 132 453"/>
    <path d="M 478 387 C 410 420, 390 430, 372 453"/>
    <path d="M 502 387 C 570 420, 590 430, 608 453"/>
    <path d="M 520 385 C 700 420, 800 425, 848 453"/>
    <!-- tools to stores -->
    <path d="M 130 508 L 130 570"/>
    <path d="M 370 508 L 372 570"/>
    <path d="M 610 508 L 608 570"/>
    <path d="M 850 508 L 850 570"/>
    <!-- stores to bedrock -->
    <path d="M 130 627 C 130 660, 300 665, 420 689"/>
    <path d="M 610 627 C 600 655, 580 665, 545 689"/>
    <!-- bedrock to final -->
    <path d="M 490 743 L 490 797"/>
  </g>

  <!-- edge labels -->
  <g font-size="11" fill="#7A7A7A">
    <text x="118" y="548" text-anchor="middle">retrieve</text>
    <text x="640" y="548" text-anchor="middle">query / draft</text>
    <text x="250" y="668" text-anchor="middle">evidence</text>
    <text x="560" y="668" text-anchor="middle">evidence</text>
    <text x="512" y="775" text-anchor="start">grounded answer</text>
  </g>

  <!-- ===== nodes ===== -->
  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="330" y="70" width="320" height="51" rx="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/>
  </g>
  <text x="490" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#1A2B45">User / Swagger UI / Frontend</text>

  <!-- FastAPI -->
  <g filter="url(#shadow)">
    <rect x="330" y="158" width="320" height="51" rx="8" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
  </g>
  <text x="490" y="180" text-anchor="middle" font-size="15" font-weight="600" fill="#1E3A1E">FastAPI Backend</text>
  <text x="490" y="198" text-anchor="middle" font-size="11" fill="#4A6B4A">app/main.py</text>

  <!-- Guardrails -->
  <g filter="url(#shadow)">
    <rect x="330" y="246" width="320" height="51" rx="8" fill="#F8CECC" stroke="#B85450" stroke-width="1.5"/>
  </g>
  <text x="490" y="268" text-anchor="middle" font-size="15" font-weight="600" fill="#5A1F1D">Guardrails</text>
  <text x="490" y="286" text-anchor="middle" font-size="11" fill="#7A3633">prompt-injection check · PII masking</text>

  <!-- LangGraph -->
  <g filter="url(#shadow)">
    <rect x="330" y="334" width="320" height="51" rx="8" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.5"/>
  </g>
  <text x="490" y="356" text-anchor="middle" font-size="15" font-weight="600" fill="#3D2A47">LangGraph Orchestrator</text>
  <text x="490" y="374" text-anchor="middle" font-size="11" fill="#6A4F77">intent routing · app/agents/graph.py</text>

  <!-- Tools row -->
  <g font-size="13.5" font-weight="600" fill="#1A2B45">
    <g filter="url(#shadow)"><rect x="30" y="455" width="200" height="53" rx="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/></g>
    <text x="130" y="487" text-anchor="middle">RAG Tool</text>

    <g filter="url(#shadow)"><rect x="270" y="455" width="200" height="53" rx="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/></g>
    <text x="370" y="487" text-anchor="middle">Ticket Tool</text>

    <g filter="url(#shadow)"><rect x="510" y="455" width="200" height="53" rx="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/></g>
    <text x="610" y="487" text-anchor="middle">SQL Tool</text>

    <g filter="url(#shadow)"><rect x="750" y="455" width="200" height="53" rx="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/></g>
    <text x="850" y="487" text-anchor="middle">Teams Tool</text>
  </g>

  <!-- Stores row -->
  <!-- ChromaDB cylinder-ish -->
  <g filter="url(#shadow)">
    <rect x="30" y="572" width="200" height="54" rx="8" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
  </g>
  <text x="130" y="595" text-anchor="middle" font-size="13.5" font-weight="600" fill="#5C4A12">ChromaDB</text>
  <text x="130" y="613" text-anchor="middle" font-size="10.5" fill="#7A6520">vector store</text>

  <!-- Mock integrations wide box -->
  <g filter="url(#shadow)">
    <rect x="270" y="572" width="680" height="54" rx="8" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
  </g>
  <text x="610" y="595" text-anchor="middle" font-size="13.5" font-weight="600" fill="#5C4A12">Mock Enterprise Integrations</text>
  <text x="610" y="613" text-anchor="middle" font-size="10.5" fill="#7A6520">ServiceNow (tickets) · Snowflake/SQL (metrics) · MS Teams (drafts, approval gate)</text>

  <!-- Bedrock -->
  <g filter="url(#shadow)">
    <rect x="310" y="686" width="360" height="57" rx="8" fill="#FF9900" stroke="#232F3E" stroke-width="1.8"/>
  </g>
  <text x="490" y="710" text-anchor="middle" font-size="16" font-weight="700" fill="#232F3E">Amazon Bedrock</text>
  <text x="490" y="729" text-anchor="middle" font-size="11.5" fill="#3A2A00">Claude Haiku 4.5 · Titan Embeddings</text>

  <!-- Final answer -->
  <g filter="url(#shadow)">
    <rect x="280" y="800" width="420" height="57" rx="8" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
  </g>
  <text x="490" y="824" text-anchor="middle" font-size="15" font-weight="600" fill="#1E3A1E">Structured Answer</text>
  <text x="490" y="843" text-anchor="middle" font-size="11" fill="#4A6B4A">summary · sources · recommended actions · confidence</text>
</svg>
