name: Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t enterprise-ai-ops-copilot:${{ github.sha }} .

      - name: Test container health check
        run: |
          docker run -d \
            --name test-container \
            -p 8000:8000 \
            -e APP_ENV=testing \
            -e AWS_REGION=eu-north-1 \
            -e AWS_ACCESS_KEY_ID=dummy \
            -e AWS_SECRET_ACCESS_KEY=dummy \
            -e BEDROCK_CHAT_MODEL_ID=dummy \
            -e BEDROCK_EMBEDDING_MODEL_ID=dummy \
            enterprise-ai-ops-copilot:${{ github.sha }}
          echo "Waiting for container to start..."
          sleep 15
          curl -f http://localhost:8000/health || (docker logs test-container && exit 1)
          docker stop test-container

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag enterprise-ai-ops-copilot:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-ai-ops-copilot:latest
          docker tag enterprise-ai-ops-copilot:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-ai-ops-copilot:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-ai-ops-copilot:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-ai-ops-copilot:${{ github.sha }}
